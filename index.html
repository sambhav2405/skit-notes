<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes Hub</title>
    <meta name="theme-color" content="#7e22ce">
    <link rel="apple-touch-icon" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <link rel="manifest" href="manifest.json">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        body { 
            font-family: 'Poppins', sans-serif; 
            transition: background-color 0.3s, color 0.3s;
            -webkit-user-select: none; 
            -ms-user-select: none; 
            user-select: none; 
            overscroll-behavior-y: contain; 
            cursor: default; 
        } 
        input, select, textarea {
            -webkit-user-select: text;
            -ms-user-select: text;
            user-select: text;
            cursor: text;
        }

        .card-shadow { box-shadow: 0 4px 6px -1px rgba(107, 33, 168, 0.1), 0 2px 4px -1px rgba(107, 33, 168, 0.06); }
        .card-hover:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(107, 33, 168, 0.15); }
        .progress-animate { transition: width 0.4s ease; }
        
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }

        .dark body { background-color: #0f172a; color: #f8fafc; } 
        .dark nav { background-color: #0f172a !important; border-bottom-color: #1e293b !important; }
        .dark .bg-white { background-color: #1e293b !important; border-color: #334155 !important; } 
        .dark .text-purple-800 { color: #f8fafc !important; } 
        .dark h1.text-purple-700 { color: #a855f7 !important; } 
        .dark .text-purple-700 { color: #c4b5fd !important; } 
        .dark .text-purple-600 { color: #a78bfa !important; }
        .dark .text-slate-800 { color: #f8fafc !important; }
        .dark .text-gray-500, .dark .text-gray-600, .dark .text-gray-400 { color: #94a3b8 !important; } 
        .dark .bg-purple-50 { background-color: #334155 !important; color: #f8fafc !important; }
        .dark input, .dark select, .dark textarea { background-color: #0f172a !important; border-color: #334155 !important; color: #f8fafc !important; }
        .dark .border-purple-200, .dark .border-purple-50, .dark .border-purple-100 { border-color: #334155 !important; }
        .dark .border-purple-300 { border-color: #475569 !important; }
        .dark .hover\:border-purple-500:hover { border-color: #a855f7 !important; }
        .dark .bg-purple-100 { background-color: #334155 !important; color: #c4b5fd !important; } 
        .dark .hover\:bg-purple-200:hover { background-color: #475569 !important; }
        .dark .bg-gray-100 { background-color: #334155 !important; color: #f8fafc !important; } 
        .dark .hover\:bg-gray-200:hover { background-color: #475569 !important; }
        .dark .bg-green-100 { background-color: rgba(16, 185, 129, 0.15) !important; color: #34d399 !important; border: 1px solid rgba(16,185,129,0.3); } 
        .dark .text-green-700 { color: #34d399 !important; }
        .dark .bg-yellow-50 { background-color: rgba(234, 179, 8, 0.1) !important; border-color: #ca8a04 !important; } 
        .dark .text-yellow-800 { color: #fde047 !important; }
        .dark .card-shadow { box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4) !important; }
        .dark .card-hover:hover { box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6) !important; border-color: #475569 !important; }
        .dark #uploadModal > div, .dark #requestModal > div { background-color: #1e293b !important; border: 1px solid #334155; }
    </style>
</head>
<body class="min-h-screen flex flex-col bg-[#f8f5ff] text-slate-800">

    <nav class="bg-[#f8f5ff] dark:bg-[#111827] border-b border-purple-200 dark:border-gray-700 px-4 sm:px-6 py-4 flex justify-between items-center sticky top-0 z-50 transition-colors">
        <h1 class="text-xl sm:text-2xl font-bold text-purple-700 cursor-pointer" onclick="navigateTo('years')">Notes</h1>
       <div class="flex gap-2 sm:gap-4 font-medium items-center">
    
    <button onclick="toggleDarkMode()" class="text-xl p-2 rounded-full hover:bg-purple-100 dark:hover:bg-gray-700 transition cursor-pointer" id="themeToggle">🌙</button>

    <button onclick="shareApp()" class="hover:bg-blue-100 dark:hover:bg-blue-900 transition flex items-center gap-1 bg-blue-50 dark:bg-gray-700 text-blue-600 dark:text-blue-400 px-3 py-1.5 rounded-full border border-blue-200 dark:border-gray-600 cursor-pointer font-bold shadow-sm">
        <span class="hidden sm:block">Share</span>
        <span>🔗</span>
    </button>

    <button onclick="navigateTo('library')" class="hover:bg-yellow-100 dark:hover:bg-yellow-900 transition flex items-center gap-1 bg-yellow-50 dark:bg-gray-700 text-yellow-600 dark:text-yellow-400 px-3 py-1.5 rounded-full border border-yellow-200 dark:border-gray-600 cursor-pointer font-bold shadow-sm">
        <span class="hidden sm:block">Library</span>
        <span>⭐</span>
    </button>

    <button onclick="toggleUpload()" class="hover:bg-purple-200 transition bg-purple-100 dark:bg-purple-900 dark:text-white text-purple-800 px-4 py-1.5 rounded-full cursor-pointer font-bold">Upload</button>
</div>
    </nav>

    <div class="container mx-auto px-4 mt-8 max-w-2xl hidden" id="searchContainer">
        <div class="relative">
            <input type="text" id="searchInput" onkeyup="handleSearch()" placeholder="Search subjects instantly (e.g. DBMS, Physics)..." class="w-full bg-white dark:bg-gray-800 border-2 border-purple-200 dark:border-gray-600 text-lg rounded-2xl py-4 px-6 pl-12 shadow-sm focus:outline-none focus:border-purple-500 dark:focus:border-purple-400 dark:text-white transition-colors cursor-text">
            <span class="absolute left-4 top-4 text-2xl">🔍</span>
        </div>
        <div id="searchResults" class="mt-4 grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
    </div>

    <main class="flex-grow container mx-auto px-4 py-6 max-w-5xl" id="app">
        <div class="text-center py-20"><p class="text-xl animate-pulse">Loading amazing notes... 🚀</p></div>
    </main>

    <div id="requestModal" class="fixed inset-0 bg-black/70 z-50 hidden flex justify-center items-center backdrop-blur-sm">
        <div class="bg-white dark:bg-gray-800 rounded-2xl p-8 max-w-md w-full shadow-2xl mx-4">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-orange-600 dark:text-orange-400">Ask for Notes 🙋‍♂️</h2>
                <button onclick="document.getElementById('requestModal').classList.add('hidden')" class="text-slate-400 hover:text-red-500 text-3xl font-bold cursor-pointer">&times;</button>
            </div>
            <div class="space-y-4">
                <input type="text" id="reqName" placeholder="Your Name" class="w-full border border-orange-200 p-3 rounded-xl outline-none bg-orange-50 dark:bg-gray-700 dark:text-white cursor-text text-sm dark:border-gray-600">
                <div class="grid grid-cols-2 gap-4">
                    <select id="reqSem" onchange="updateReqSubjects()" class="w-full border border-orange-200 p-3 rounded-xl outline-none bg-orange-50 dark:bg-gray-700 dark:text-white cursor-pointer text-sm dark:border-gray-600">
                        <option value="1">1st Sem</option><option value="2">2nd Sem</option><option value="3">3rd Sem</option><option value="4" selected>4th Sem</option>
                    </select>
                    <select id="reqSub" class="w-full border border-orange-200 p-3 rounded-xl outline-none bg-orange-50 dark:bg-gray-700 dark:text-white cursor-pointer text-sm dark:border-gray-600"></select>
                </div>
                <textarea id="reqMsg" rows="3" placeholder="What exactly do you need? (e.g., Unit 4 handwritten notes for Mid-terms)" class="w-full border border-orange-200 p-3 rounded-xl outline-none bg-orange-50 dark:bg-gray-700 dark:text-white cursor-text text-sm dark:border-gray-600"></textarea>
                <button onclick="submitRequestForm()" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-xl shadow-lg transition cursor-pointer">Post Request 🚀</button>
            </div>
        </div>
    </div>

    <div id="uploadModal" class="fixed inset-0 bg-black/70 z-50 hidden flex justify-center items-center backdrop-blur-sm">
        <div class="bg-white dark:bg-gray-800 rounded-2xl p-8 max-w-lg w-full shadow-2xl mx-4 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-purple-700 dark:text-purple-300">Upload Center</h2>
                <button onclick="toggleUpload()" class="text-slate-400 hover:text-red-500 text-3xl font-bold cursor-pointer">&times;</button>
            </div>
            
            <div class="space-y-4 mb-4">
                <div>
                    <label class="text-sm font-semibold text-purple-700 dark:text-purple-300">Your Name (Credit keliye)</label>
                    <input type="text" id="upName" placeholder="e.g. Sambhav Jain (IT)" class="w-full border border-purple-200 p-3 rounded-xl mt-1 outline-none bg-purple-50 dark:bg-gray-700 dark:text-white cursor-text">
                    <p class="text-xs text-purple-500 mt-1 italic">Add your surname or branch to avoid mixing points with others!</p>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="text-sm font-semibold text-purple-700 dark:text-purple-300">Material Type</label>
                        <select id="upType" class="w-full border border-purple-200 p-3 rounded-xl mt-1 outline-none bg-purple-50 dark:bg-gray-700 dark:text-white cursor-pointer">
                            <option value="Notes">Study Notes</option>
                            <option value="Question Paper">Question Paper</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-sm font-semibold text-purple-700 dark:text-purple-300">Semester</label>
                        <select id="upSem" onchange="updateUploadSubjects()" class="w-full border border-purple-200 p-3 rounded-xl mt-1 outline-none bg-purple-50 dark:bg-gray-700 dark:text-white cursor-pointer">
                            <option value="1">1st Sem</option><option value="2">2nd Sem</option><option value="3">3rd Sem</option><option value="4" selected>4th Sem</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-sm font-semibold text-purple-700 dark:text-purple-300">Subject</label>
                        <select id="upSub" class="w-full border border-purple-200 p-3 rounded-xl mt-1 outline-none bg-purple-50 dark:bg-gray-700 dark:text-white cursor-pointer"></select>
                    </div>
                </div>
            </div>

            <div class="relative border-2 border-dashed border-purple-300 rounded-2xl p-8 text-center hover:border-purple-500 transition-colors bg-purple-50/50 mt-4 cursor-pointer">
                <input type="file" id="fileInput" multiple accept=".pdf" class="absolute inset-0 opacity-0 cursor-pointer w-full h-full">
                <div class="text-purple-500 text-4xl mb-2">📁</div>
                <p class="font-bold text-purple-800 dark:text-purple-200">Select PDF Files</p>
                <p class="text-xs text-purple-600 mt-1">Earn credits by uploading!</p>
            </div>
            <div id="uploadQueue" class="mt-6 space-y-3"></div>
        </div>
    </div>

    <div id="pdfModal" class="fixed inset-0 bg-black/95 z-[100] hidden flex-col backdrop-blur-sm">
        <div class="p-4 flex justify-between items-center text-white">
            <h3 class="font-bold text-lg ml-4 text-purple-300">Document Viewer</h3>
            <button onclick="closePDF()" class="bg-red-500 hover:bg-red-600 px-6 py-2 rounded-full font-bold shadow-lg transition cursor-pointer">Close ✕</button>
        </div>
        <div class="flex-grow p-4 pt-0 w-full h-full">
            <iframe id="pdfFrame" src="" class="w-full h-full rounded-2xl bg-white shadow-2xl"></iframe>
        </div>
    </div>

    <script>
        // --- ⚙️ CONFIGURATION ---
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw4Bk6I_G9a5-4AtooVhTmzCrCKHqrjIgjcVCULg2Zz_qgRzpWHvK54fVID6siNZhrs/exec'; 
        
        let GLOBAL_NOTES_DB = []; 
        let GLOBAL_REQUESTS = []; 
        let uploadControllers = {}; // ✨ For Cancelling Uploads
        let isDarkMode = localStorage.getItem('theme') === 'dark';

        const dataTree = {
            "First Year": {
                "Semester 1": ["Engineering Mathematics- I", "Engineering Physics", "Computational thinking and Programming", "Communication Skills", "Basic Electrical and Electronics Engineering", "Engineering Physics Lab", "C Programing Lab", "Manufacturing Practice Workshop", "Computer Aided Engineering Graphics"],
                "Semester 2": ["Engineering Mathematics - II", "Engineering Chemistry", "Problem Solving using Object Oriented Paradigm", "Universal Human Values", "Basic Civil Engineering", "Basic Mechanical Engineering", "Engineering Chemistry Lab", "Object Oriented Programming Lab", "Basic Electrical & Electronics Engineering Lab", "Computer Aided Machine Drawing"]
            },
            "Second Year": {
                "Semester 3": ["Managerial Economics", "Technical Communication", "Stats & Prob", "DSA", "Operating System", "Software Engineering", "Digital Electronics"],
                "Semester 4": ["MEFA", "Discrete Maths", "DBMS", "Theory of Computation", "Computer Networks", "Artificial Intelligence", "Computer Architecture"]
            },
            "Third Year": { "Semester 5": ["Coming Soon"], "Semester 6": ["Coming Soon"] },
            "Fourth Year": { "Semester 7": ["Coming Soon"], "Semester 8": ["Coming Soon"] }
        };

        const appDiv = document.getElementById('app');
        const searchContainer = document.getElementById('searchContainer');

        async function init() {
            applyTheme();
            try {
                const response = await fetch(GOOGLE_SCRIPT_URL);
                const fullData = await response.json();
                
                if (Array.isArray(fullData)) {
                    GLOBAL_NOTES_DB = fullData; 
                } else {
                    GLOBAL_NOTES_DB = fullData.notes || [];
                    GLOBAL_REQUESTS = fullData.requests || [];
                }
            } catch (e) { console.error("Database fetch failed", e); }
            navigateTo('years');
        }

        function applyTheme() {
            if (isDarkMode) { document.documentElement.classList.add('dark'); document.getElementById('themeToggle').innerText = '☀️'; } 
            else { document.documentElement.classList.remove('dark'); document.getElementById('themeToggle').innerText = '🌙'; }
        }
        function toggleDarkMode() { isDarkMode = !isDarkMode; localStorage.setItem('theme', isDarkMode ? 'dark' : 'light'); applyTheme(); }
        
        function shareSite() {
            if (navigator.share) navigator.share({ title: 'Notes Hub', text: '📚 Exams ki tension khatam! Yahan saare Notes aur Previous Year Papers available hain. Check it out: ', url: window.location.origin });
            else { navigator.clipboard.writeText(window.location.origin); alert("✅ Message & Link Copied!"); }
        }

        function handleSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const resultsDiv = document.getElementById('searchResults');
            if (query.length < 2) { resultsDiv.innerHTML = ''; return; }
            let results = [];
            for (let year in dataTree) {
                for (let sem in dataTree[year]) {
                    dataTree[year][sem].forEach(sub => {
                        if (sub.toLowerCase().includes(query)) {
                            const semNumber = sem.replace('Semester ', '');
                            results.push({ year, semNumber, sub });
                        }
                    });
                }
            }
            resultsDiv.innerHTML = results.slice(0, 6).map(r => `<div onclick="navigateTo('materialTypes', {year: '${r.year}', semNumber: '${r.semNumber}', subject: '${r.sub}'})" class="bg-white dark:bg-gray-800 p-4 rounded-xl cursor-pointer shadow-sm border border-purple-100 dark:border-gray-600 hover:border-purple-400 transition"><h4 class="font-bold text-purple-700 dark:text-purple-300 truncate" title="${r.sub}">${r.sub}</h4><p class="text-xs text-gray-500 dark:text-gray-400">Semester ${r.semNumber}</p></div>`).join('');
        }

        async function upvote(id, btnElement) {
            if(localStorage.getItem('upvoted_' + id)) { alert("You have already upvoted this! 💖"); return; }
            const countSpan = btnElement.querySelector('.count');
            countSpan.innerText = parseInt(countSpan.innerText) + 1;
            btnElement.classList.replace('bg-purple-100', 'bg-green-100');
            localStorage.setItem('upvoted_' + id, 'true');
            fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'upvote', id: id }) });
        }

        // ✨ NEW: BEAUTIFUL SVG STAR BOOKMARK LOGIC ✨
        function toggleBookmark(id, btnElement) {
            let saved = JSON.parse(localStorage.getItem('my_library') || '[]');
            const idStr = id.toString();
            
            if (saved.includes(idStr)) {
                // Remove from library
                saved = saved.filter(nId => nId !== idStr);
                btnElement.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-7 h-7 text-gray-300 dark:text-gray-600 hover:text-yellow-400 transition-colors"><path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499a.562.562 0 0 1 1.04 0l2.125 5.111a.563.563 0 0 0 .475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 0 0-.182.557l1.285 5.385a.562.562 0 0 1-.84.61l-4.725-2.885a.562.562 0 0 0-.586 0L6.982 20.54a.562.562 0 0 1-.84-.61l1.285-5.386a.562.562 0 0 0-.182-.557l-4.204-3.602a.562.562 0 0 1 .321-.988l5.518-.442a.563.563 0 0 0 .475-.345L11.48 3.5Z" /></svg>`;
                
                // Hide instantly if on library page
                if (window.history.state && window.history.state.view === 'library') {
                    btnElement.closest('.card-wrapper').style.display = 'none';
                }
            } else {
                // Add to library
                saved.push(idStr);
                btnElement.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-7 h-7 text-yellow-400 drop-shadow-md hover:scale-110 transition-transform"><path fill-rule="evenodd" d="M10.788 3.21c.448-1.077 1.976-1.077 2.424 0l2.082 5.006 5.404.434c1.164.093 1.636 1.545.749 2.305l-4.117 3.527 1.257 5.273c.271 1.136-.964 2.033-1.96 1.425L12 18.354 7.373 21.18c-.996.608-2.231-.29-1.96-1.425l1.257-5.273-4.117-3.527c-.887-.76-.415-2.212.749-2.305l5.404-.434 2.082-5.005Z" clip-rule="evenodd" /></svg>`;
            }
            localStorage.setItem('my_library', JSON.stringify(saved));
        }

        function getBookmarkHTML(id) {
            let saved = JSON.parse(localStorage.getItem('my_library') || '[]');
            const isSaved = saved.includes(id.toString());
            
            const iconHTML = isSaved 
                ? `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-7 h-7 text-yellow-400 drop-shadow-md hover:scale-110 transition-transform"><path fill-rule="evenodd" d="M10.788 3.21c.448-1.077 1.976-1.077 2.424 0l2.082 5.006 5.404.434c1.164.093 1.636 1.545.749 2.305l-4.117 3.527 1.257 5.273c.271 1.136-.964 2.033-1.96 1.425L12 18.354 7.373 21.18c-.996.608-2.231-.29-1.96-1.425l1.257-5.273-4.117-3.527c-.887-.76-.415-2.212.749-2.305l5.404-.434 2.082-5.005Z" clip-rule="evenodd" /></svg>` 
                : `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-7 h-7 text-gray-300 dark:text-gray-600 hover:text-yellow-400 transition-colors"><path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499a.562.562 0 0 1 1.04 0l2.125 5.111a.563.563 0 0 0 .475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 0 0-.182.557l1.285 5.385a.562.562 0 0 1-.84.61l-4.725-2.885a.562.562 0 0 0-.586 0L6.982 20.54a.562.562 0 0 1-.84-.61l1.285-5.386a.562.562 0 0 0-.182-.557l-4.204-3.602a.562.562 0 0 1 .321-.988l5.518-.442a.563.563 0 0 0 .475-.345L11.48 3.5Z" /></svg>`;
            
            return `<button onclick="toggleBookmark('${id}', this)" class="absolute top-4 right-4 z-20 cursor-pointer" title="Save to Library">${iconHTML}</button>`;
        }

        function navigateTo(view, params = {}) { window.history.pushState({ view, params }, ""); renderView(view, params); }
        window.onpopstate = function(event) { if (event.state) renderView(event.state.view, event.state.params); else renderView('years'); };

        function renderView(view, params) {
            searchContainer.classList.add('hidden'); 
            if (view === 'years') renderYears();
            if (view === 'semesters') renderSemesters(params.year);
            if (view === 'subjects') renderSubjects(params.year, params.sem);
            if (view === 'materialTypes') renderMaterialTypes(params.year, params.semNumber, params.subject);
            if (view === 'notes') renderNotes(params.semNumber, params.subject, params.type);
            if (view === 'bounty') renderBountyBoard(); 
            if (view === 'library') renderLibrary(); 
        }

        function renderLibrary() {
            searchContainer.classList.add('hidden');
            let savedIds = JSON.parse(localStorage.getItem('my_library') || '[]');
            let savedNotes = GLOBAL_NOTES_DB.filter(note => savedIds.includes(note.id.toString()));

            let html = `
                <div class="mb-6 flex justify-between items-center">
                    <div>
                        <button onclick="window.history.back()" class="text-purple-600 dark:text-purple-400 hover:underline mb-2 cursor-pointer block">← Back</button>
                        <h2 class="text-3xl font-bold text-yellow-600 dark:text-yellow-400">My Library ⭐</h2>
                        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Your personal collection for quick revision!</p>
                    </div>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            `;

            if (savedNotes.length === 0) {
                html += `<div class="col-span-full text-center py-16 bg-white dark:bg-gray-800 rounded-2xl card-shadow border-2 border-dashed border-yellow-200 dark:border-gray-700"><p class="text-yellow-600 dark:text-yellow-400 font-bold text-lg mb-2">Your library is empty! 📭</p><p class="text-sm text-gray-500 dark:text-gray-400">Click the ⭐ icon on any note to save it here.</p></div>`;
            } else {
                savedNotes.forEach(item => {
                    const downloadUrl = item.file_url.replace('export=view', 'export=download');
                    const isUpvoted = localStorage.getItem('upvoted_' + item.id);
                    
                    html += `
                        <div class="card-wrapper relative bg-white dark:bg-gray-800 p-5 rounded-2xl card-shadow flex flex-col justify-between border border-purple-50 dark:border-gray-700 card-hover h-full group transition-all duration-300 select-none">
                            
                            ${getBookmarkHTML(item.id)}

                            <div class="flex justify-between items-start mb-3 gap-3 pr-10">
                                <div class="flex-1 min-w-0">
                                    <span class="text-[10px] font-bold bg-purple-100 text-purple-700 px-2 py-1 rounded dark:bg-purple-900/30 dark:text-purple-300 mb-2 inline-block">${item.subject}</span>
                                    <h3 class="font-bold text-purple-800 dark:text-purple-300 text-lg leading-tight line-clamp-2 break-all group-hover:line-clamp-none transition-all duration-300 cursor-default" title="${item.title}">${item.title}</h3>
                                    <p class="text-xs text-gray-500 dark:text-gray-400 mt-1 line-clamp-2 break-all group-hover:line-clamp-none transition-all duration-300 cursor-default" title="Uploaded by: ${item.uploader}">Uploaded by: <b>${item.uploader}</b> • ${item.file_size || 'PDF'}</p>

        function updateUploadSubjects() {

        // ✨ NEW: ABORT CONTROLLER TO CANCEL UPLOADS ✨
        function cancelUpload(id) {
            if(uploadControllers[id]) {
                uploadControllers[id].abort();
                delete uploadControllers[id];
            }
            const el = document.getElementById(`queue-item-${id}`);
            if(el) el.remove();
        }

        async function processUpload(file) {
            const id = new Date().getTime().toString() + Math.floor(Math.random() * 100);
            const sem = document.getElementById('upSem').value;
            const sub = document.getElementById('upSub').value;
            const type = document.getElementById('upType').value;
            const uploader = document.getElementById('upName').value.trim() || 'Anonymous';

            // Initialize abort controller
            uploadControllers[id] = new AbortController();

            const queue = document.getElementById('uploadQueue');
            const item = document.createElement('div');
            item.id = `queue-item-${id}`;
            item.className = 'bg-purple-50 dark:bg-gray-700 p-3 rounded-xl border border-purple-200 dark:border-gray-600';
            // Added ❌ Cancel Button
            item.innerHTML = `<div class="flex justify-between mb-1"><span class="font-semibold text-sm truncate w-32 text-purple-800 dark:text-white" title="${file.name}">${file.name}</span><div class="flex items-center gap-2"><span id="status-${id}" class="text-xs text-purple-600 font-bold">Uploading...</span><button onclick="cancelUpload('${id}')" class="text-red-500 hover:text-red-700 text-xs font-bold cursor-pointer" title="Cancel">❌</button></div></div><div class="w-full bg-purple-200 h-1.5 rounded-full overflow-hidden"><div id="bar-${id}" class="bg-purple-600 h-full w-0 progress-animate"></div></div>`;
            queue.appendChild(item);

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                try {
                    updateBar(id, 40);
                    const payload = { 
                        base64: reader.result.split(',')[1], filename: file.name, mimetype: file.type, 
                        title: file.name.replace('.pdf', ''), semester: sem, subject: sub, type: type, 
                        size: (file.size / (1024*1024)).toFixed(2) + ' MB',
                        uploader: uploader, id: id, action: 'upload'
                    };
                    
                    // Pass the abort signal
                    const response = await fetch(GOOGLE_SCRIPT_URL, { 
                        method: 'POST', 
                        body: JSON.stringify(payload),
                        signal: uploadControllers[id].signal 
                    });
                    
                    const driveData = await response.json();
                    if (driveData.error) throw new Error(driveData.error);
                    
                    updateBar(id, 100);
                    document.getElementById(`status-${id}`).innerText = "✅ Done";
                    
                    GLOBAL_NOTES_DB.unshift({ ...payload, created_at: new Date().toLocaleDateString(), file_url: driveData.url, upvotes: 0 });
                    setTimeout(() => item.remove(), 4000);
                } catch (err) {
                    if (err.name === 'AbortError') {
                        console.log("Upload manually cancelled.");
                    } else {
                        document.getElementById(`status-${id}`).innerText = "❌ Failed";
                        document.getElementById(`bar-${id}`).classList.replace('bg-purple-600', 'bg-red-500');
                    }
                }
            };
        }
        function updateBar(id, val) { 
            const bar = document.getElementById(`bar-${id}`);
            if(bar) bar.style.width = val + '%'; 
        }

        init();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    console.log('PWA Service Worker registered!', reg);
                }).catch(err => console.log('Service Worker registration failed', err));
            });
        }

    const shareData = {
        title: 'Notes Hub - Collaborative Learning 📚',
        text: `*Notes Hub: बेहतर पढ़ाई, अब सबके साथ!* 🚀\n\nनमस्ते! मैंने *Notes Hub* पर अपनी पढ़ाई के लिए बेहतरीन नोट्स देखे हैं। यहाँ आप न केवल नोट्स पढ़ सकते हैं, बल्कि अपने नोट्स भी अपलोड करके दूसरों की मदद कर सकते हैं।\n\nआइए, मिलकर अपनी पढ़ाई को और भी आसान और व्यवस्थित बनाते हैं! यहाँ देखें: 👇`,
        url: window.location.origin 
    };

    if (navigator.share) {
        navigator.share(shareData)
            .catch((error) => console.log('Error sharing', error));
    } else {
        const dummyText = `${shareData.text}\n${shareData.url}`;
        navigator.clipboard.writeText(dummyText);
        alert("✅ प्रोफेशनल मैसेज और लिंक कॉपी हो गया है!");
    }
}
    </script>
